# CI/CD Pipeline for kite-collector — RFC-0051
# Runs on every push/PR to main. Release on v* tags.
name: Kite Collector

on:
  push:
    branches: [main]
    tags:
      - "v*"
  pull_request:
    branches: [main]

concurrency:
  group: kite-${{ github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: "1.26"
  CGO_ENABLED: "0"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ──────────────────────────────────────────────
  # Phase 1: Quality Gates (parallel)
  # ──────────────────────────────────────────────

  vet:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
      - run: go vet ./...

  lint:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Install golangci-lint v2
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@latest
      - run: golangci-lint run --timeout=5m ./...

  security:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Install gosec
        run: go install github.com/securego/gosec/v2/cmd/gosec@latest
      - run: gosec -exclude-generated ./...

  test:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Run tests
        run: go test -count=1 -coverprofile=coverage.out ./...
      - name: Coverage summary
        run: go tool cover -func=coverage.out | tail -1
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage
          path: coverage.out
          retention-days: 30

  tidy:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Check go mod tidy
        run: |
          go mod tidy
          if ! git diff --exit-code go.mod go.sum; then
            echo "::error::go.mod or go.sum is not tidy. Run 'go mod tidy' and commit."
            exit 1
          fi

  # ──────────────────────────────────────────────
  # Phase 2: Build (after all gates pass)
  # ──────────────────────────────────────────────

  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    needs: [vet, lint, security, test]
    if: "!startsWith(github.ref, 'refs/tags/v')"
    strategy:
      matrix:
        goos: [linux, darwin, windows]
        goarch: [amd64, arm64]
        exclude:
          - goos: windows
            goarch: arm64
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
      # Embed the Windows app manifest (UAC requireAdministrator +
      # Common-Controls 6.0) before the Windows build, so the wizard binary
      # ships with the resources it needs. The .syso is named with the
      # _windows_amd64 suffix so the Go toolchain links it only into the
      # matching matrix cell — no-op on linux/darwin builds.
      - name: Generate Windows resources
        if: matrix.goos == 'windows'
        run: |
          go install github.com/akavel/rsrc@latest
          rsrc -manifest cmd/kite-collector/app.manifest \
               -arch ${{ matrix.goarch }} \
               -o cmd/kite-collector/rsrc_windows_${{ matrix.goarch }}.syso
      - name: Build
        run: |
          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} \
          go build -ldflags="-s -w \
            -X main.version=${{ github.ref_name }} \
            -X main.commit=${{ github.sha }} \
            -X main.date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
          -o kite-collector-${{ matrix.goos }}-${{ matrix.goarch }} \
          ./cmd/kite-collector
      - uses: actions/upload-artifact@v7
        with:
          name: kite-collector-${{ matrix.goos }}-${{ matrix.goarch }}
          path: kite-collector-${{ matrix.goos }}-${{ matrix.goarch }}
          retention-days: 30

  # ──────────────────────────────────────────────
  # Phase 3: Release (v* tags only)
  # ──────────────────────────────────────────────

  release:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    needs: [vet, lint, security, test]
    if: startsWith(github.ref, 'refs/tags/v')
    # Bind to the "Deployment" environment so the job can access environment-
    # scoped secrets (notably HOMEBREW_TAP_GITHUB_TOKEN). Repository-scoped
    # secrets are visible everywhere; environment-scoped secrets only fire
    # for jobs that opt in here. Also enables protection rules (required
    # reviewers, wait timers, branch restrictions) on the release flow.
    environment: Deployment
    permissions:
      contents: write
      pages: write # Requerido para actualizar la rama gh-pages sin fricciones
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}

      # wixl is the WiX toolset's Linux-native MSI builder. On Ubuntu 24.04
      # (noble) and later, wixl ships as a standalone package separate from
      # msitools; install both so the build works on older releases too.
      # Used by scripts/build-msi.sh in the post-goreleaser step below.
      # Without wixl, the MSI build step fails with "wixl: command not found".
      - name: Install dependencies (wixl, dpkg-dev, snapcraft)
        run: |
          sudo apt-get update && sudo apt-get install -y --no-install-recommends wixl msitools dpkg-dev
          sudo snap install snapcraft --classic

      # Embed the Windows app manifest (UAC requireAdministrator +
      # Common-Controls 6.0) before the Windows build in the goreleaser
      # matrix. Same step as the per-PR build job above, but lives in
      # the release job so a release-only push (push to tag without
      # touching main) still produces a properly-manifested .exe.
      - name: Generate Windows resources
        run: |
          go install github.com/akavel/rsrc@latest
          rsrc -manifest cmd/kite-collector/app.manifest \
               -arch amd64 \
               -o cmd/kite-collector/rsrc_windows_amd64.syso

      - name: Diagnose secret presence (length only — values are masked)
        # Confirms whether HOMEBREW_TAP_GITHUB_TOKEN is set on THIS repo at
        # THIS workflow ref. Length-only print; GitHub redacts secret values
        # in logs, but ${#VAR} is the integer length and is safe to log.
        # If the secret is missing, you'll see UNSET here, which confirms
        # the 403 is "secret not configured" rather than "PAT lacks scope".
        run: |
          set -u
          if [ -n "${HOMEBREW_TAP_GITHUB_TOKEN:-}" ]; then
            echo "HOMEBREW_TAP_GITHUB_TOKEN: SET (length=${#HOMEBREW_TAP_GITHUB_TOKEN})"
          else
            echo "HOMEBREW_TAP_GITHUB_TOKEN: UNSET — add it as a repo secret on"
            echo "  https://github.com/${{ github.repository }}/settings/secrets/actions"
            exit 1
          fi
          if [ -n "${GITHUB_TOKEN:-}" ]; then
            echo "GITHUB_TOKEN: SET (length=${#GITHUB_TOKEN})"
          fi
        env:
          # NOTE: deliberately NO `|| secrets.GITHUB_TOKEN` fallback here.
          # We want to fail fast and visibly when the secret is missing, not
          # silently use the wrong token and 403 in the goreleaser step.
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Cross-repo write to VulnerTrack/homebrew-tap requires a PAT (or
          # fine-grained token) with contents:write on that repo. Stored as
          # repo secret HOMEBREW_TAP_GITHUB_TOKEN.
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
          # Token para publicar automáticamente en la Snap Store:
          SNAPCRAFT_STORE_CREDENTIALS: ${{ secrets.SNAPCRAFT_STORE_CREDENTIALS }}

      # Build the Windows MSI from the .exe goreleaser just produced and
      # attach it to the GitHub Release as an additional asset. Runs after
      # goreleaser publishes so the release already exists for `gh release
      # upload` to target. Pure OSS path — no goreleaser Pro license needed.
      - name: Build MSI and attach to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          COMMIT="${GITHUB_SHA:0:7}"
          ./scripts/build-msi.sh "$VERSION" "$COMMIT"
          gh release upload "$GITHUB_REF_NAME" \
            "dist/kite-collector_${VERSION}_amd64.msi" \
            --clobber

      - name: Publish to WinGet
        if: env.WINGET_TOKEN != ''
        uses: vedantmgoyal9/winget-releaser@v2
        with:
          identifier: VulnerTrack.KiteCollector
          max-retries: 3
          token: ${{ secrets.WINGET_TOKEN }}
        env:
          WINGET_TOKEN: ${{ secrets.WINGET_TOKEN }}

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          artifact-name: kite-collector-sbom.spdx.json
          path: .

      # ──────────────────────────────────────────────
      # Generación Dinámica del Repositorio APT
      # ──────────────────────────────────────────────
      - name: Generar estructura del repositorio APT y firmar
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
        run: |
          # 1. Importar clave privada GPG
          echo "$GPG_PRIVATE_KEY" | gpg --import --batch

          # 2. Crear carpetas de arquitectura APT
          mkdir -p public/dists/stable/main/binary-amd64
          mkdir -p public/dists/stable/main/binary-arm64

          # 3. Mover los paquetes .deb creados por GoReleaser al directorio público
          cp dist/*.deb public/dists/stable/main/binary-amd64/ 2>/dev/null || true
          cp dist/*.deb public/dists/stable/main/binary-arm64/ 2>/dev/null || true

          # Limpiar duplicados cruzados dejando solo lo correspondiente a cada arquitectura
          rm -f public/dists/stable/main/binary-amd64/*_arm64.deb
          rm -f public/dists/stable/main/binary-arm64/*_amd64.deb

          # 4. Generar índices de paquetes
          cd public
          dpkg-scanpackages dists/stable/main/binary-amd64 /dev/null > dists/stable/main/binary-amd64/Packages
          gzip -9fk dists/stable/main/binary-amd64/Packages

          dpkg-scanpackages dists/stable/main/binary-arm64 /dev/null > dists/stable/main/binary-arm64/Packages
          gzip -9fk dists/stable/main/binary-arm64/Packages

          # 5. Estructurar archivo maestro Release
          cd dists/stable
          echo "Origin: VulnerTrack" > Release
          echo "Label: Kite Collector Repo" >> Release
          echo "Suite: stable" >> Release
          echo "Codename: stable" >> Release
          echo "Architectures: amd64 arm64" >> Release
          echo "Components: main" >> Release
          echo "Description: Repositorio oficial de APT para Kite Collector" >> Release

          echo "MD5Sum:" >> Release
          printf " $(md5sum main/binary-amd64/Packages | cut -d' ' -f1) %s main/binary-amd64/Packages\n" $(wc -c < main/binary-amd64/Packages) >> Release
          printf " $(md5sum main/binary-amd64/Packages.gz | cut -d' ' -f1) %s main/binary-amd64/Packages.gz\n" $(wc -c < main/binary-amd64/Packages.gz) >> Release
          printf " $(md5sum main/binary-arm64/Packages | cut -d' ' -f1) %s main/binary-arm64/Packages\n" $(wc -c < main/binary-arm64/Packages) >> Release
          printf " $(md5sum main/binary-arm64/Packages.gz | cut -d' ' -f1) %s main/binary-arm64/Packages.gz\n" $(wc -c < main/binary-arm64/Packages.gz) >> Release

          echo "SHA256:" >> Release
          printf " $(sha256sum main/binary-amd64/Packages | cut -d' ' -f1) %s main/binary-amd64/Packages\n" $(wc -c < main/binary-amd64/Packages) >> Release
          printf " $(sha256sum main/binary-amd64/Packages.gz | cut -d' ' -f1) %s main/binary-amd64/Packages.gz\n" $(wc -c < main/binary-amd64/Packages.gz) >> Release
          printf " $(sha256sum main/binary-arm64/Packages | cut -d' ' -f1) %s main/binary-arm64/Packages\n" $(wc -c < main/binary-arm64/Packages) >> Release
          printf " $(sha256sum main/binary-arm64/Packages.gz | cut -d' ' -f1) %s main/binary-arm64/Packages.gz\n" $(wc -c < main/binary-arm64/Packages.gz) >> Release

          # 6. Firmar índices con tu clave (79847F85E3FF6E43)
          gpg --batch --yes --clearsign --digest-algo SHA256 -u 79847F85E3FF6E43 -o InRelease Release
          gpg --batch --yes --detach-sign --digest-algo SHA256 -u 79847F85E3FF6E43 -o Release.gpg Release

          # 7. Exportar clave pública al raíz del deployment
          cd ../..
          gpg --armor --export 79847F85E3FF6E43 > repository.key

      - name: Desplegar repositorio a GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: public
