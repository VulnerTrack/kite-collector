version: "2"

linters:
  enable:
    - govet
    - staticcheck
    - errcheck
    - gosec
    - bodyclose
    - sqlclosecheck
    - noctx
    - exhaustive
    - prealloc
    - nilerr
    - ineffassign
    - wrapcheck
  settings:
    gosec:
      severity: high
      confidence: medium
    govet:
      enable-all: true

formatters:
  enable:
    - gofumpt
