# configs/kite-collector.example.yaml

# Global settings
log_level: info          # debug, info, warn, error
output_format: json      # json, table, csv
data_dir: ./data         # SQLite file location

# VulnerTrack OAuth linking (used by /kite-login in the local dashboard)
oauth:
  supabase_url: https://wjurmocfraqhdqarnytz.supabase.co
  authorize_url: https://api.vulnertrack.com/auth/v1/oauth/authorize
  client_id: d9be121a-a430-4c3a-9837-5cf67f9edfa3
  scope: "openid email"
  redirect_path: /oauth/callback

# Discovery sources
discovery:
  sources:
    network:
      enabled: true
      scope:
        - 192.168.1.0/24
        - 10.0.0.0/16
      tcp_ports: [22, 80, 443, 3389, 8080, 8443]
      timeout: 5s
      max_concurrent: 256

    agent:
      enabled: true
      collect_software: true
      collect_interfaces: true

    # Vendor API connectors
    docker:
      enabled: true
      host: unix:///var/run/docker.sock  # or tcp://host:2376
      # Credentials: KITE_DOCKER_HOST (overrides host)

    unifi:
      enabled: false
      endpoint: https://192.168.1.1:8443
      site: default
      # Credentials: KITE_UNIFI_USERNAME, KITE_UNIFI_PASSWORD

    proxmox:
      enabled: false
      endpoint: https://pve.local:8006
      # Credentials: KITE_PROXMOX_TOKEN_ID, KITE_PROXMOX_TOKEN_SECRET

    snmp:
      enabled: false
      community: public
      scope: [192.168.1.0/24]
      timeout: 5s
      max_concurrent: 32

    # VPS provider connectors
    hetzner:
      enabled: false
      # Credentials: KITE_HETZNER_TOKEN

    digitalocean:
      enabled: false
      # Credentials: KITE_DIGITALOCEAN_TOKEN

    vultr:
      enabled: false
      # Credentials: KITE_VULTR_TOKEN

    hostinger:
      enabled: false
      # Credentials: KITE_HOSTINGER_TOKEN

    linode:
      enabled: false
      # Credentials: KITE_LINODE_TOKEN

    scaleway:
      enabled: false
      # Credentials: KITE_SCALEWAY_SECRET_KEY
      # Zone: KITE_SCALEWAY_ZONE (default: fr-par-1)

    ovhcloud:
      enabled: false
      # Credentials: KITE_OVHCLOUD_APP_KEY, KITE_OVHCLOUD_APP_SECRET,
      #              KITE_OVHCLOUD_CONSUMER_KEY
      # Region: KITE_OVHCLOUD_REGION (default: eu)

    upcloud:
      enabled: false
      # Credentials: KITE_UPCLOUD_USERNAME, KITE_UPCLOUD_PASSWORD

    kamatera:
      enabled: false
      # Credentials: KITE_KAMATERA_CLIENT_ID, KITE_KAMATERA_SECRET

    # MDM/CMDB connectors (RFC-0135). Every source below defaults to
    # enabled: false and stays fully disabled in that state even if its KITE_*
    # credential env vars are set (Finding F3 fix). api_url / instance_url /
    # username / password / token / api_key / tenant_id / client_id /
    # client_secret / table / site_id are now REAL config fields (previously
    # silently dropped) — set them here or via env vars; config values take
    # precedence. Secrets set here are never written to SQLite, logs, or events.
    # Every source's base URL is validated (SSRF-guarded) before first use;
    # private/loopback IPs are rejected except for the self-hosted connectors
    # (sccm, netbox, device42).

    # MDM connectors — devices from these sources are marked is_managed = "managed"
    intune:
      enabled: false
      # Microsoft Intune via Graph API (OAuth2 client credentials; fixed
      # Microsoft endpoints — no api_url).
      # tenant_id / client_id / client_secret here, or KITE_INTUNE_TENANT_ID /
      # KITE_INTUNE_CLIENT_ID / KITE_INTUNE_CLIENT_SECRET

    jamf:
      enabled: false
      # Jamf Pro Classic API (SaaS)
      api_url: https://myorg.jamfcloud.com
      # username / password here, or KITE_JAMF_USERNAME / KITE_JAMF_PASSWORD

    sccm:
      enabled: false
      # Microsoft SCCM/ConfigMgr AdminService REST API (self-hosted)
      api_url: https://sccm.corp.local
      # username / password here, or KITE_SCCM_USERNAME / KITE_SCCM_PASSWORD

    workspace_one:
      enabled: false
      # Omnissa Workspace ONE UEM REST API (SaaS)
      api_url: https://as1409.awmdm.com
      # username / password / api_key (aw-tenant-code) here, or
      # KITE_WORKSPACEONE_USERNAME / KITE_WORKSPACEONE_PASSWORD / KITE_WORKSPACEONE_API_KEY

    kandji:
      enabled: false
      # Kandji Apple MDM REST API (SaaS)
      api_url: https://contoso.api.kandji.io
      # api_key here, or KITE_KANDJI_API_TOKEN (read-only)

    # CMDB connectors — CIs from these sources are marked is_authorized = "authorized"
    netbox:
      enabled: false
      # NetBox REST API (DCIM/IPAM; self-hosted)
      api_url: https://netbox.corp.local
      # token here, or KITE_NETBOX_TOKEN (read-only)

    servicenow:
      enabled: false
      # ServiceNow Table API (CMDB; SaaS)
      instance_url: https://myorg.service-now.com
      table: cmdb_ci_server
      # username / password here, or KITE_SERVICENOW_USERNAME /
      # KITE_SERVICENOW_PASSWORD (KITE_SERVICENOW_TABLE overrides table)

    device42:
      enabled: false
      # Device42 DCIM/ITAM REST API (self-hosted)
      api_url: https://device42.corp.local
      # username / password here, or KITE_DEVICE42_USERNAME / KITE_DEVICE42_PASSWORD

    lansweeper:
      enabled: false
      # Lansweeper Data Export API (GraphQL; SaaS Cloud)
      api_url: https://api.lansweeper.com/api/v2/graphql
      site_id: "11111111-2222-3333-4444-555555555555"
      # api_key here, or KITE_LANSWEEPER_API_KEY (KITE_LANSWEEPER_SITE_ID overrides site_id)

    # aws:                    # Future
    #   enabled: false
    #   regions: [us-east-1, eu-west-1]
    #   assume_role: arn:aws:iam::123456789012:role/kite-reader

# Classification
classification:
  authorization:
    # Assets matching any allowlist entry are marked "authorized"
    # Everything else is "unknown" (never defaults to "authorized")
    allowlist_file: ./configs/authorized-assets.yaml
    # Match strategy: hostname, mac_address, ip_address, cloud_instance_id
    match_fields: [hostname]

  managed:
    # Required controls for is_managed = "managed"
    required_controls: []   # Empty = opt-in (guidelines 3.2)

# Stale detection
stale_threshold: 168h       # 7 days

# Streaming mode (Phase 2)
# streaming:
#   interval: 6h
#   otlp:
#     endpoint: localhost:4317
#     protocol: grpc         # grpc or http
#     tls:
#       enabled: true
#       cert_file: /etc/kite/tls/client.crt
#       key_file: /etc/kite/tls/client.key
#
# postgres:
#   dsn: postgres://kite:password@localhost:5432/vulnertrack?sslmode=require

# Metrics
metrics:
  enabled: true
  listen: :9090             # Prometheus scrape endpoint
