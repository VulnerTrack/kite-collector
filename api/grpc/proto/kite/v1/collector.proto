syntax = "proto3";

package kite.v1;

option go_package = "github.com/vulnertrack/kite-collector/api/grpc/proto/kite/v1;kitev1";

import "google/protobuf/timestamp.proto";

service CollectorService {
    // ReportAssets streams asset snapshots from agents to the server.
    rpc ReportAssets(stream AssetSnapshot) returns (ReportResponse);

    // ReportFindings streams configuration audit findings from agents.
    rpc ReportFindings(stream ConfigFinding) returns (ReportResponse);

    // Heartbeat allows agents to signal liveness without a full report.
    rpc Heartbeat(HeartbeatRequest) returns (HeartbeatResponse);

    // Enroll performs a token-based enrollment handshake to obtain mTLS
    // credentials for an agent connecting to this endpoint.
    rpc Enroll(EnrollRequest) returns (EnrollResponse);

    // RenewCertificate allows an already-enrolled agent to renew its
    // mTLS client certificate before expiry.
    rpc RenewCertificate(RenewRequest) returns (RenewResponse);
}

message AssetSnapshot {
    string hostname = 1;
    string asset_type = 2;
    string os_family = 3;
    string os_version = 4;
    string environment = 5;
    string owner = 6;
    string criticality = 7;
    string tags_json = 8;
    google.protobuf.Timestamp collected_at = 9;
    repeated InstalledPackage software = 10;
    string discovery_source = 11;
}

message ConfigFinding {
    string finding_id = 1;
    string asset_id = 2;
    string category = 3;
    string rule_id = 4;
    string severity = 5;
    string title = 6;
    string detail = 7;
    string remediation = 8;
    google.protobuf.Timestamp found_at = 9;
}

message InstalledPackage {
    string name = 1;
    string version = 2;
    string vendor = 3;
    string cpe23 = 4;
    string package_manager = 5;
}

message ReportResponse {
    int32 accepted = 1;
    int32 rejected = 2;
}

message HeartbeatRequest {
    string agent_id = 1;
    string agent_version = 2;
    int64 uptime_seconds = 3;
    string status = 4;
}

message HeartbeatResponse {
    google.protobuf.Timestamp server_time = 1;
}

message EnrollRequest {
    string agent_id = 1;
    string public_key = 2;
    string hostname = 3;
    string machine_fingerprint = 4;
    string enrollment_token = 5;
    string agent_version = 6;
    string os_family = 7;
}

message EnrollResponse {
    string status = 1;
    bytes ca_certificate = 2;
    bytes client_certificate = 3;
    bytes client_key_encrypted = 4;
    int64 certificate_expires_at = 5;
    string jwks_url = 6;
}

message RenewRequest {
    string agent_id = 1;
    bytes csr = 2;
}

message RenewResponse {
    string status = 1;
    bytes client_certificate = 2;
    int64 certificate_expires_at = 3;
}

// SecureEnvelope wraps JWE-encrypted and JWS-signed payloads for any
// data RPC when end-to-end encryption is enabled.
message SecureEnvelope {
    string jwe_compact = 1;
    string key_id = 2;
}
