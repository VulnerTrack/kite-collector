version: 2

# Pre-build hooks. Run once before any `builds:` entry kicks off — output
# of the rsrc step (cmd/kite-collector/rsrc_windows_amd64.syso) is picked
# up automatically by the Go toolchain when GOOS=windows. Without this,
# the released kite-collector.exe would lack the embedded UAC manifest +
# Common-Controls 6.0 dependency that the install wizard relies on.
before:
  hooks:
    - go mod tidy
    - go install github.com/akavel/rsrc@latest
    - rsrc -manifest cmd/kite-collector/app.manifest -arch amd64 -o cmd/kite-collector/rsrc_windows_amd64.syso

builds:
  - id: kite-collector
    main: ./cmd/kite-collector
    binary: kite-collector
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}
    # FreeBSD and OpenBSD are tier-2: they cross-compile cleanly with
    # CGO_ENABLED=0 and the pure-Go modernc.org/sqlite driver, but have no
    # CI runtime tests yet. Identity hardening (TPM, OS keyring) silently
    # falls back to plain-disk on these platforms — same behavior as
    # darwin/windows for the keyring backend.
    # NetBSD + Dragonfly are intentionally excluded: modernc.org/sqlite
    # v1.48.1 has an upstream bug on those targets (mu.enter/mu.leave
    # undefined). Re-add when the driver is patched.
    # Build order: linux first (primary deployment target), then windows
    # (largest user base after linux), then darwin (developer workstations),
    # then BSDs (tier-2).
    goos: [linux, windows, darwin, freebsd, openbsd]
    goarch: [amd64, arm64]
    ignore:
      - goos: windows
        goarch: arm64

# Tarball for Homebrew (brews requires tar.gz, not raw binaries).
archives:
  - id: homebrew
    formats: [tar.gz]
    name_template: "kite-collector_{{ .Os }}_{{ .Arch }}"
  # Flat binary distribution — single file download, no tar.gz.
  - id: flat
    formats: [binary]
    name_template: "kite-collector_{{ .Os }}_{{ .Arch }}_bin"

checksum:
  name_template: "checksums.txt"

# Linux packages via nfpm.
nfpms:
  - id: packages
    package_name: kite-collector
    vendor: VulnerTrack
    homepage: https://github.com/VulnerTrack/kite-collector
    maintainer: VulnerTrack <hello@vulnertrack.dev>
    description: Cybersecurity asset discovery, configuration audit, and posture analysis agent.
    license: MIT
    formats:
      - deb
      - rpm
    bindir: /usr/local/bin
    contents:
      - src: configs/kite-collector.example.yaml
        dst: /etc/kite-collector/kite-collector.example.yaml
        type: config

# Homebrew Cask — GoReleaser auto-generates the cask and pushes it to
# the tap repo on every v* release.
homebrew_casks:
  - name: kite-collector
    ids: [homebrew]
    binaries: [kite-collector]
    repository:
      owner: VulnerTrack
      name: homebrew-tap
      branch: main
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    homepage: https://github.com/VulnerTrack/kite-collector
    description: "Cybersecurity asset discovery, configuration audit, and posture analysis agent"
    hooks:
      post:
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/kite-collector"]
          end

# Configuración para la Snap Store
snapcrafts:
  - id: default
    name: kite-collector
    summary: Cybersecurity asset discovery and posture analysis agent.
    description: |
      Kite Collector is a cybersecurity asset discovery, configuration audit, 
      and posture analysis agent developed by VulnerTrack.
    publish: true
    grade: stable
    confinement: strict
    base: core22
    license: MIT

# Scoop manifests
scoops:
  - name: kite-collector
    ids: [homebrew]
    repository:
      owner: VulnerTrack
      name: homebrew-tap
      branch: main
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    directory: scoop
    homepage: https://github.com/VulnerTrack/kite-collector
    description: "Cybersecurity asset discovery, configuration audit, and posture analysis agent"
    license: MIT

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
