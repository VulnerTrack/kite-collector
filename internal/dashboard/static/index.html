<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>kite-collector dashboard</title>
<link rel="stylesheet" href="/static/style.css">
<script src="/static/htmx.min.js"></script>
</head>
<body>
<div class="container">

<header>
  <h1>kite-collector</h1>
  <div class="meta">
    <span>Cybersecurity Asset Discovery Agent</span>
  </div>
</header>

<nav>
  <a hx-get="/fragments/assets" hx-target="#content" hx-push-url="false" class="active"
     onclick="setActive(this)">Assets</a>
  <a hx-get="/fragments/software" hx-target="#content" hx-push-url="false"
     onclick="setActive(this)">Software</a>
  <a hx-get="/fragments/findings" hx-target="#content" hx-push-url="false"
     onclick="setActive(this)">Findings</a>
  <a hx-get="/fragments/scans" hx-target="#content" hx-push-url="false"
     onclick="setActive(this)">Scans</a>
  <a hx-get="/fragments/tables" hx-target="#content" hx-push-url="false"
     onclick="setActive(this)">Tables</a>
  <a href="/onboarding">Onboarding</a>
  <div style="flex:1"></div>
  <button class="btn" hx-post="/api/v1/scan" hx-target="#scan-status" hx-swap="innerHTML">Run Scan</button>
</nav>

<div id="scan-status"
     hx-get="/fragments/scan-status"
     hx-trigger="load, every 3s"
     hx-swap="innerHTML">
  <span class="badge badge-gray">Loading scan status…</span>
</div>

<div id="content" hx-get="/fragments/assets" hx-trigger="load" hx-target="#content">
  <div class="htmx-indicator">Loading...</div>
</div>

<aside id="sidebar" class="sidebar" aria-hidden="true"></aside>

<footer>
  kite-collector dashboard &mdash; all data from local SQLite, no external connections
</footer>

</div>

<script>
function setActive(el) {
  document.querySelectorAll('nav a').forEach(function(a) { a.classList.remove('active'); });
  el.classList.add('active');
  closeSidebar();
}
function openSidebar() {
  var s = document.getElementById('sidebar');
  if (s) { s.classList.add('sidebar-open'); s.setAttribute('aria-hidden', 'false'); }
}
function closeSidebar() {
  var s = document.getElementById('sidebar');
  if (s) { s.classList.remove('sidebar-open'); s.setAttribute('aria-hidden', 'true'); s.innerHTML = ''; }
}
</script>
</body>
</html>
