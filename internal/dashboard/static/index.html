<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>kite-collector dashboard</title>
<link rel="stylesheet" href="/static/style.css">
<script src="/static/htmx.min.js"></script>
</head>
<body>
<div class="container">

<header>
  <h1>kite-collector</h1>
  <div class="meta">
    <span>Cybersecurity Asset Discovery Agent</span>
  </div>
</header>

<nav>
  <a hx-get="/fragments/assets" hx-target="#content" hx-push-url="false" class="active"
     onclick="setActive(this)">Assets</a>
  <a hx-get="/fragments/software" hx-target="#content" hx-push-url="false"
     onclick="setActive(this)">Software</a>
  <a hx-get="/fragments/findings" hx-target="#content" hx-push-url="false"
     onclick="setActive(this)">Findings</a>
  <a hx-get="/fragments/scans" hx-target="#content" hx-push-url="false"
     onclick="setActive(this)">Scans</a>
  <div style="flex:1"></div>
  <button class="btn" hx-post="/api/v1/scan" hx-target="#scan-status">Run Scan</button>
</nav>

<div id="scan-status"></div>

<div id="content" hx-get="/fragments/assets" hx-trigger="load" hx-target="#content">
  <div class="htmx-indicator">Loading...</div>
</div>

<footer>
  kite-collector dashboard &mdash; all data from local SQLite, no external connections
</footer>

</div>

<script>
function setActive(el) {
  document.querySelectorAll('nav a').forEach(function(a) { a.classList.remove('active'); });
  el.classList.add('active');
}
</script>
</body>
</html>
